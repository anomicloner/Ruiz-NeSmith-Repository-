<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timesheet — Basement Project</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0F11;
    --surface: #16181C;
    --surface2: #1E2128;
    --border: #2A2D35;
    --accent: #C8F135;
    --accent-dim: rgba(200,241,53,0.12);
    --text: #F0F2F5;
    --muted: #6B7280;
    --red: #FF5757;
    --red-dim: rgba(255,87,87,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px 60px; }
  .page { max-width: 580px; margin: 0 auto; }

  .header { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
  .header-eyebrow { font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .header h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1.1; }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  .section { margin-bottom: 24px; }
  .section-label { font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input[type="text"], .field input[type="date"], .field input[type="time"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px;
    padding: 11px 14px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 500;
    color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; color-scheme: dark;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  .break-list { display: flex; flex-direction: column; gap: 8px; }
  .break-item { display: grid; grid-template-columns: 1fr 1fr 36px; gap: 8px; align-items: end; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .remove-btn { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,87,87,0.2); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: background 0.15s; align-self: flex-end; flex-shrink: 0; }
  .remove-btn:hover { background: rgba(255,87,87,0.22); }
  .add-break-btn { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 9px; padding: 10px; width: 100%; font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: border-color 0.2s, color 0.2s; }
  .add-break-btn:hover { border-color: var(--accent); color: var(--accent); }

  .notes-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; font-family: 'Outfit', sans-serif; font-size: 0.93rem; color: var(--text); outline: none; resize: vertical; min-height: 90px; transition: border-color 0.2s, box-shadow 0.2s; color-scheme: dark; }
  .notes-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .notes-input::placeholder { color: var(--muted); }

  .pay-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
  .pay-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .pay-stat { background: var(--surface2); padding: 14px 12px; text-align: center; }
  .pay-stat .ps-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
  .pay-stat .ps-val { font-family: 'Outfit', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); }
  .pay-total-row { display: flex; align-items: center; justify-content: space-between; background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.2); border-radius: 10px; padding: 14px 18px; }
  .pay-total-row .ptl { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
  .pay-total-row .pta { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }

  .submit-btn { width: 100%; background: var(--accent); color: #0E0F11; border: none; border-radius: 12px; padding: 15px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .toast { display: none; margin-top: 12px; border-radius: 10px; padding: 12px 16px; font-size: 0.9rem; font-weight: 600; text-align: center; }
  .toast.success { background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.25); color: var(--accent); display: block; }
  .toast.error { background: var(--red-dim); border: 1px solid rgba(255,87,87,0.2); color: var(--red); display: block; }
  .divider { height: 1px; background: var(--border); margin: 28px 0; }

  @media (max-width: 440px) {
    .grid-2 { grid-template-columns: 1fr; }
    .pay-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-eyebrow">Work Log</div>
    <h1>Basement Project</h1>
    <p>$5.00 / hr &nbsp;·&nbsp; Submit when done for the day</p>
  </div>

  <div class="section">
    <div class="section-label">Your Info</div>
    <div class="card grid-2">
      <div class="field"><label>Name</label><input type="text" id="worker-name" placeholder="Full name"></div>
      <div class="field"><label>Date</label><input type="date" id="work-date"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Hours</div>
    <div class="card grid-2">
      <div class="field"><label>Clock In</label><input type="time" id="start-time" oninput="calculate()"></div>
      <div class="field"><label>Clock Out</label><input type="time" id="end-time" oninput="calculate()"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Breaks</div>
    <div class="card">
      <div class="break-list" id="break-list"></div>
      <button class="add-break-btn" onclick="addBreak()">+ Add Break</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Notes</div>
    <div class="card">
      <textarea class="notes-input" id="notes" placeholder="What did you get done? Any issues or supplies needed?"></textarea>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-label" style="margin-bottom:10px">Pay Summary</div>
  <div class="pay-card">
    <div class="pay-stats">
      <div class="pay-stat"><span class="ps-label">Shift</span><span class="ps-val" id="total-time">—</span></div>
      <div class="pay-stat"><span class="ps-label">Breaks</span><span class="ps-val" id="break-time">—</span></div>
      <div class="pay-stat"><span class="ps-label">Worked</span><span class="ps-val" id="hours-worked">—</span></div>
    </div>
    <div class="pay-total-row">
      <span class="ptl">Total earnings</span>
      <span class="pta" id="total-pay">$0.00</span>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitTimesheet()">Submit Timesheet</button>
  <div class="toast" id="toast"></div>
</div>

<script>
  const BIN_ID = '69c5d8e5aa77b81da92383b8';
  const API_KEY = '$2a$10$gzYoisEruOX8cy/Tpl0pducif0NcRI0ldg2/RoB/nK5s1FnrgxHwe';

  document.getElementById('work-date').valueAsDate = new Date();
  let breakCount = 0;

  function addBreak() {
    breakCount++;
    const id = breakCount;
    const list = document.getElementById('break-list');
    const div = document.createElement('div');
    div.className = 'break-item';
    div.id = 'break-' + id;
    div.innerHTML = `
      <div class="field"><label>Break Start</label><input type="time" id="bs-${id}" oninput="calculate()"></div>
      <div class="field"><label>Break End</label><input type="time" id="be-${id}" oninput="calculate()"></div>
      <button class="remove-btn" onclick="removeBreak(${id})">✕</button>`;
    list.appendChild(div);
    calculate();
  }

  function removeBreak(id) { document.getElementById('break-' + id).remove(); calculate(); }

  function timeToMins(t) {
    if (!t) return null;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function minsToLabel(m) {
    if (m == null || m < 0) return '—';
    return `${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`;
  }

  function calculate() {
    const start = timeToMins(document.getElementById('start-time').value);
    const end = timeToMins(document.getElementById('end-time').value);
    let totalMins = (start !== null && end !== null && end > start) ? end - start : 0;
    let breakMins = 0;
    document.querySelectorAll('[id^="bs-"]').forEach(el => {
      const bId = el.id.replace('bs-', '');
      const bs = timeToMins(el.value);
      const be = timeToMins(document.getElementById('be-' + bId).value);
      if (bs !== null && be !== null && be > bs) breakMins += (be - bs);
    });
    const workedMins = Math.max(0, totalMins - breakMins);
    const pay = (workedMins / 60) * 5;
    document.getElementById('total-time').textContent = minsToLabel(totalMins);
    document.getElementById('break-time').textContent = minsToLabel(breakMins);
    document.getElementById('hours-worked').textContent = minsToLabel(workedMins);
    document.getElementById('total-pay').textContent = '$' + pay.toFixed(2);
    return { totalMins, breakMins, workedMins, pay };
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(() => t.className = 'toast', 5000);
  }

  async function submitTimesheet() {
    const name = document.getElementById('worker-name').value.trim();
    const date = document.getElementById('work-date').value;
    const start = document.getElementById('start-time').value;
    const end = document.getElementById('end-time').value;
    if (!name) { showToast('Enter your name before submitting.', 'error'); return; }
    if (!start || !end) { showToast('Enter clock in and clock out times.', 'error'); return; }
    const { workedMins, pay } = calculate();
    const breaks = [];
    document.querySelectorAll('[id^="bs-"]').forEach(el => {
      const bId = el.id.replace('bs-', '');
      if (el.value && document.getElementById('be-' + bId).value)
        breaks.push({ start: el.value, end: document.getElementById('be-' + bId).value });
    });
    const entry = { id: Date.now(), name, date, start, end, breaks, notes: document.getElementById('notes').value, workedMins, pay: pay.toFixed(2), submittedAt: new Date().toISOString() };
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Submitting...';
    try {
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
      const getData = await getRes.json();
      const existing = getData.record.timesheets || [];
      existing.push(entry);
      const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify({ timesheets: existing })
      });
      if (putRes.ok) { showToast('Timesheet submitted.', 'success'); btn.textContent = 'Submitted ✓'; }
      else throw new Error();
    } catch {
      showToast('Submission failed. Check your connection and try again.', 'error');
      btn.disabled = false; btn.textContent = 'Submit Timesheet';
    }
  }

  calculate();
</script>
</body>
</html>
