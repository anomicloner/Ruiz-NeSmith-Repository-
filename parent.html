<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timesheet Review</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0F11;
    --surface: #16181C;
    --surface2: #1E2128;
    --border: #2A2D35;
    --accent: #C8F135;
    --accent-dim: rgba(200,241,53,0.12);
    --text: #F0F2F5;
    --muted: #6B7280;
    --red: #FF5757;
    --red-dim: rgba(255,87,87,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 16px 60px; }
  .page { max-width: 640px; margin: 0 auto; }

  .header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
  .header-left .eyebrow { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: 1.9rem; font-weight: 800; line-height: 1.1; }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: border-color 0.2s, color 0.2s; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .summary-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 28px; }
  .strip-item { background: var(--surface); padding: 18px 16px; }
  .strip-item .sl { font-size: 0.65rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  .strip-item .sv { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .strip-item.accent-item .sv { color: var(--accent); }

  .entries { display: flex; flex-direction: column; gap: 12px; }

  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .entry-top { padding: 18px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
  .entry-name { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; }
  .entry-date { font-size: 0.82rem; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .entry-pay { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }

  .entry-mid { padding: 14px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; border-bottom: 1px solid var(--border); }
  .em-item .eml { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
  .em-item .emv { font-size: 0.92rem; font-weight: 600; color: var(--text); }

  .entry-bot { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .entry-notes { font-size: 0.85rem; color: var(--muted); font-weight: 500; flex: 1; line-height: 1.4; }
  .entry-notes strong { color: var(--text); font-weight: 600; }
  .delete-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap; flex-shrink: 0; }
  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  .breaks-tag { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .break-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; font-weight: 600; color: var(--muted); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { font-size: 0.95rem; font-weight: 500; }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }

  .loading { text-align: center; padding: 50px; color: var(--muted); font-weight: 500; }

  @media (max-width: 480px) {
    .summary-strip { grid-template-columns: 1fr 1fr; }
    .entry-mid { grid-template-columns: 1fr 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 14px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">Parent View</div>
      <h1>Timesheet Review</h1>
    </div>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>

  <div class="summary-strip">
    <div class="strip-item"><span class="sl">Sessions</span><span class="sv" id="s-sessions">—</span></div>
    <div class="strip-item"><span class="sl">Hours Worked</span><span class="sv" id="s-hours">—</span></div>
    <div class="strip-item accent-item"><span class="sl">Total Owed</span><span class="sv" id="s-owed">—</span></div>
  </div>

  <div class="entries" id="entries"><div class="loading">Loading...</div></div>
</div>

<script>
  const BIN_ID = '69c5d8e5aa77b81da92383b8';
  const API_KEY = '$2a$10$gzYoisEruOX8cy/Tpl0pducif0NcRI0ldg2/RoB/nK5s1FnrgxHwe';

  function fmt12(t) {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  }
  function minsToLabel(m) { return `${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`; }
  function fmtDate(d) {
    if (!d) return '—';
    const [y,mo,day] = d.split('-');
    return new Date(y,mo-1,day).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  }

  async function deleteEntry(id, all) {
    if (!confirm('Remove this entry?')) return;
    const updated = all.filter(e => e.id !== id);
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ timesheets: updated })
    });
    load();
  }

  async function load() {
    document.getElementById('entries').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
      const data = await res.json();
      const all = data.record.timesheets || [];
      const list = all.slice().reverse();

      const totalMins = all.reduce((s,e) => s+(e.workedMins||0),0);
      const totalPay = all.reduce((s,e) => s+parseFloat(e.pay||0),0);
      document.getElementById('s-sessions').textContent = all.length;
      document.getElementById('s-hours').textContent = minsToLabel(totalMins);
      document.getElementById('s-owed').textContent = '$'+totalPay.toFixed(2);

      if (!list.length) {
        document.getElementById('entries').innerHTML = `<div class="empty"><div class="icon">📋</div><p>No timesheets yet.</p></div>`;
        return;
      }

      document.getElementById('entries').innerHTML = list.map((e,i) => {
        const breaksHtml = e.breaks?.length ? `<div class="breaks-tag">${e.breaks.map(b=>`<span class="break-pill">${fmt12(b.start)} – ${fmt12(b.end)}</span>`).join('')}</div>` : '';
        const notesHtml = e.notes ? `<span class="entry-notes"><strong>Note:</strong> ${e.notes}</span>` : '<span class="entry-notes" style="opacity:0.4">No notes</span>';
        const safeAll = JSON.stringify(all).replace(/\\/g,'\\\\').replace(/"/g,'&quot;');
        return `<div class="entry" style="animation-delay:${i*0.04}s">
          <div class="entry-top">
            <div><div class="entry-name">${e.name}</div><div class="entry-date">${fmtDate(e.date)}</div></div>
            <div class="entry-pay">$${e.pay}</div>
          </div>
          <div class="entry-mid">
            <div class="em-item"><span class="eml">Clock In</span><span class="emv">${fmt12(e.start)}</span></div>
            <div class="em-item"><span class="eml">Clock Out</span><span class="emv">${fmt12(e.end)}</span></div>
            <div class="em-item"><span class="eml">Worked</span><span class="emv">${minsToLabel(e.workedMins)}</span></div>
          </div>
          ${breaksHtml}
          <div class="entry-bot">${notesHtml}<button class="delete-btn" onclick="deleteEntry(${e.id}, JSON.parse(this.dataset.all))" data-all="${safeAll}">Remove</button></div>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('entries').innerHTML = '<div class="loading">Failed to load. Check your connection.</div>';
    }
  }

  load();
</script>
</body>
</html>
